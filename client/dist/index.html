    <script>
      // Samsung Internet (Galaxy Z Fold cover screen) ignora width=device-width
      // y usa viewport 980px, escalando todo el contenido al ~42%.
      // Corrección: si innerWidth >> screen.width, forzar viewport al ancho real.
      ;(function(){
        var sw = window.screen.width;
        if(sw > 0 && sw < 700 && window.innerWidth > sw * 1.3){
          document.querySelector('meta[name=viewport]').setAttribute('content',
            'width='+sw+',initial-scale=1.0,minimum-scale=1.0,maximum-scale=5.0,viewport-fit=cover');
        }
      })();
    </script>
