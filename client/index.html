<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <script>
      // Chrome en Galaxy Z Fold cover screen ignora width=device-width y usa 980px.
      // Usamos document.write para generar el meta viewport ANTES de que Chrome
      // lo procese, con el ancho real de la pantalla (screen.width).
      ;(function(){
        var sw = window.screen.width;
        var content = (sw > 100 && sw < 700)
          ? 'width=' + sw + ',initial-scale=1.0,minimum-scale=1.0,maximum-scale=5.0,viewport-fit=cover'
          : 'width=device-width,initial-scale=1.0,viewport-fit=cover';
        document.write('<meta name="viewport" content="' + content + '">');
      })();
    </script>
    <!-- Pantalla completa automática para ventanas de salida/escenario/virtual.
         Chrome no transfiere transient-activation a popups, así que el primer
         click o keydown (ej: avanzar diapositiva) dispara el fullscreen. -->
    <script>
      ;(function(){
        if (location.search.indexOf('fs=1') === -1) return;
        var el = document.documentElement;
        var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
        if (!req) return;
        function tryFS() {
          req.call(el).catch(function(){});
        }
        // Intento síncrono (funciona en Firefox y algunos contextos de Chrome)
        tryFS();
        // Fallback: primer click O primera tecla dispara fullscreen
        function onFirst() {
          document.removeEventListener('click',   onFirst, true);
          document.removeEventListener('keydown', onFirst, true);
          if (!document.fullscreenElement) tryFS();
        }
        document.addEventListener('click',   onFirst, true);
        document.addEventListener('keydown', onFirst, true);
      })();
    </script>
